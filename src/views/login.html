<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>東洋リース在庫管理 - ログイン</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>body{font-family:'Hiragino Sans','Noto Sans JP',system-ui,sans-serif;background:linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}input{min-height:48px;font-size:16px}button{min-height:48px}</style>
</head>
<body>
<div class="w-full max-w-md mx-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-teal-600 rounded-2xl flex items-center justify-center mx-auto mb-3"><i class="fas fa-boxes-stacked text-white text-2xl"></i></div>
      <h1 class="text-xl font-bold text-gray-800">東洋リース在庫管理</h1>
      <p class="text-sm text-gray-500 mt-1">在庫管理システム</p>
    </div>
    <div id="loginForm">
      <div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">ユーザー名</label><input type="text" id="username" class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="ユーザー名" autocomplete="username"></div>
      <div class="mb-6"><label class="block text-sm font-medium text-gray-700 mb-1">パスワード</label><input type="password" id="password" class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="••••••••" autocomplete="current-password"></div>
      <button onclick="loginPw()" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-lg py-3 transition mb-3"><i class="fas fa-sign-in-alt mr-2"></i>ログイン</button>
      <div class="relative my-4"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div><div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">または</span></div></div>
      <button onclick="loginPk()" id="pkBtn" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-lg py-3 transition flex items-center justify-center gap-2"><i class="fas fa-fingerprint text-lg"></i>パスキーでログイン</button>
    </div>
    <div id="error" class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm hidden"></div>
  </div>
</div>
<script>
const B='/trzaiko';
function err(m){const e=document.getElementById('error');e.textContent=m;e.classList.remove('hidden')}
async function loginPw(){
  const username=document.getElementById('username').value.trim(),password=document.getElementById('password').value;
  if(!username||!password){err('入力してください');return}
  try{const r=await fetch(B+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});const d=await r.json();if(d.success)location.href=B+'/';else err(d.error||'ログイン失敗')}catch(e){err('通信エラー')}
}
async function loginPk(){
  try{
    if(!window.PublicKeyCredential){err('パスキー非対応');return}
    const optR=await fetch(B+'/api/passkey/auth-options',{method:'POST',headers:{'Content-Type':'application/json'}});
    const opt=await optR.json();
    opt.challenge=b2a(opt.challenge);
    if(opt.allowCredentials)opt.allowCredentials=opt.allowCredentials.map(c=>({...c,id:b2a(c.id)}));
    const cred=await navigator.credentials.get({publicKey:opt});
    const body={id:cred.id,rawId:a2b(cred.rawId),type:cred.type,response:{clientDataJSON:a2b(cred.response.clientDataJSON),authenticatorData:a2b(cred.response.authenticatorData),signature:a2b(cred.response.signature),userHandle:cred.response.userHandle?a2b(cred.response.userHandle):null}};
    const r=await fetch(B+'/api/passkey/auth-verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();if(d.success)location.href=B+'/';else err(d.error||'認証失敗');
  }catch(e){if(e.name==='NotAllowedError')err('キャンセル');else err(e.message)}
}
function b2a(b){const s=b.replace(/-/g,'+').replace(/_/g,'/');const r=atob(s);const a=new Uint8Array(r.length);for(let i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a.buffer}
function a2b(b){const a=new Uint8Array(b);let s='';a.forEach(v=>s+=String.fromCharCode(v));return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')}
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')loginPw()});
(async()=>{if(!window.PublicKeyCredential){document.getElementById('pkBtn').style.display='none';return}try{if(!await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable())document.getElementById('pkBtn').style.display='none'}catch(e){}})();
</script>
</body>
</html>
